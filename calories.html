<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Daily Calorie Calculator | Smash Fitness Studio</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Estimate your BMR and daily calories with activity and goal adjustments (cutting/bulking).">
    <style>
    /* Small local style to ensure form spacing doesn't collapse if CSS missing */
    .form-row label{display:block;margin-bottom:8px}
    </style>
</head>
<body>
<header class="site-header">
    <div class="brand"><div class="logo">SF</div><div><h1>Daily Calorie Calculator</h1></div></div>
    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="workouts.html">Workouts</a>
        <a href="nutrition.html">Nutrition</a>
        <a href="membership.html">Membership</a>
        <a href="bmi.html">BMI</a>
        <a href="calories.html">Calorie Calc</a>
    </nav>
    <div id="auth-area" class="auth-area">
        <button id="auth-btn" class="auth-btn">Login</button>
    </div>
</header>

<main class="container">
    <div class="card form-card">
        <h2>Estimate your daily calories (Mifflin–St Jeor)</h2>
        <form id="calForm" class="form-row" style="margin-top:12px">
            <select id="sex" class="input" aria-label="Sex">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <input id="age" class="input" type="number" placeholder="Age (years)" min="10" value="25" aria-label="Age">
            <input id="weight" class="input" type="number" placeholder="Weight (kg)" min="20" step="0.1" aria-label="Weight">
            <input id="height" class="input" type="number" placeholder="Height (cm)" min="80" step="0.1" aria-label="Height">

            <select id="activity" class="input" aria-label="Activity level">
                <option value="1.2">Sedentary (little or no exercise)</option>
                <option value="1.375">Lightly active (1–3 days/week)</option>
                <option value="1.55">Moderately active (3–5 days/week)</option>
                <option value="1.725">Very active (6–7 days/week)</option>
                <option value="1.9">Extra active (physical job)</option>
            </select>

            <select id="goal" class="input" aria-label="Goal">
                <option value="-0.20">Cutting (–20%)</option>
                <option value="0">Maintenance (0%)</option>
                <option value="0.15">Bulking (+15%)</option>
            </select>

            <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
                <button id="calcCal" class="btn" type="button">Calculate</button>
                <button id="resetCal" class="btn secondary" type="button">Reset</button>
            </div>
        </form>

        <div id="calResult" class="result" style="display:none;margin-top:12px"></div>
    </div>
</main>

<footer class="site-footer">© 2025 Smash Fitness Studio</footer>

<script src="auth.js"></script>

<script>
function round(n){return Math.round(n)}
document.getElementById('calcCal').addEventListener('click', ()=>{
    const sex = document.getElementById('sex').value;
    const age = parseFloat(document.getElementById('age').value);
    const w = parseFloat(document.getElementById('weight').value);
    const h = parseFloat(document.getElementById('height').value);
    const activity = parseFloat(document.getElementById('activity').value);
    const goal = parseFloat(document.getElementById('goal').value);
    const out = document.getElementById('calResult');
    if(!age || !w || !h){ out.style.display='block'; out.innerHTML='<div class="muted">Please enter valid age, weight and height.</div>'; return; }
    // Mifflin-St Jeor
    let bmr = 10*w + 6.25*h - 5*age + (sex==='male'?5:-161);
    let tdee = bmr * activity;
    let adjusted = tdee * (1 + goal);
    const protein_g = 2 * w;
    const protein_kcal = protein_g * 4;
    const fats_kcal = adjusted * 0.25;
    const fats_g = fats_kcal / 9;
    const carbs_kcal = adjusted - (protein_kcal + fats_kcal);
    const carbs_g = carbs_kcal / 4;

    out.style.display='block';
    out.innerHTML = `
        <strong>BMR:</strong> ${round(bmr)} kcal/day<br>
        <strong>TDEE (maintenance):</strong> ${round(tdee)} kcal/day<br>
        <strong>Goal-adjusted:</strong> ${round(adjusted)} kcal/day<br>
        <div style="margin-top:8px"><strong>Suggested macros:</strong></div>
        <ul>
            <li>Protein: ${round(protein_g)} g/day (${round(protein_kcal)} kcal)</li>
            <li>Fats: ${round(fats_g)} g/day (${round(fats_kcal)} kcal)</li>
            <li>Carbs: ${round(carbs_g)} g/day (${round(carbs_kcal)} kcal)</li>
        </ul>
        <div class="small muted">Note: this is an estimate. For personalised plans consult a coach or nutritionist.</div>
    `;
});

document.getElementById('resetCal').addEventListener('click', function(){
    ['age','weight','height'].forEach(id => document.getElementById(id).value='');
    document.getElementById('calResult').innerHTML = '';
    document.getElementById('calResult').style.display = 'none';
});
</script>

</body>
</html>
