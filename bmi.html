<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>BMI Calculator | Smash Fitness Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
    <div class="brand"><div class="logo">SF</div><div><h1>BMI Calculator</h1></div></div>
    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="workouts.html">Workouts</a>
        <a href="nutrition.html">Nutrition</a>
        <a href="membership.html">Membership</a>
        <a href="bmi.html">BMI</a>
        <a href="calories.html">Calorie Calc</a>
    </nav>
</header>

        <div id="auth-area" class="auth-area">
            <button id="auth-btn" class="auth-btn">Login</button>
        </div>
<main class="container">
    <div class="card form-card">
        <h2>Body Mass Index (BMI)</h2>
        <p class="muted small">Enter your weight and height to calculate BMI and see the category.</p>
        <form id="bmiForm" class="form-row" style="margin-top:12px">
            <input id="weight" class="input" type="number" placeholder="Weight (kg)" min="20" step="0.1" required aria-label="Weight">
            <input id="height" class="input" type="number" placeholder="Height (cm)" min="80" step="0.1" required aria-label="Height">
            <div style="display:flex;gap:8px;align-items:center">
                <button type="submit" class="btn">Calculate</button>
                <button type="button" id="resetBtn" class="btn secondary">Reset</button>
            </div>
        </form>
        <div id="bmiResult" class="result" style="display:none;margin-top:12px"></div>
    </div>
</main>

<footer class="site-footer">© 2025 Smash Fitness Studio</footer>

<script src="auth.js"></script>

<script>
document.getElementById('bmiForm').addEventListener('submit', function(e){
    e.preventDefault();
    const w = parseFloat(document.getElementById('weight').value);
    const h = parseFloat(document.getElementById('height').value);
    const out = document.getElementById('bmiResult');
    if(!w || !h){ out.style.display='block'; out.innerHTML='<div class="muted">Please enter valid weight and height.</div>'; return; }
    const heightM = h/100;
    const bmi = w / (heightM*heightM);
    let cat = '';
    if(bmi < 18.5) cat = 'Underweight';
    else if(bmi < 25) cat = 'Normal weight';
    else if(bmi < 30) cat = 'Overweight';
    else cat = 'Obese';
    out.style.display='block';
    out.innerHTML = `<strong>BMI:</strong> ${bmi.toFixed(1)} <br><strong>Category:</strong> ${cat}`;
});

document.getElementById('resetBtn').addEventListener('click', function(){
    document.getElementById('weight').value = '';
    document.getElementById('height').value = '';
    document.getElementById('bmiResult').innerHTML = '';
    document.getElementById('bmiResult').style.display = 'none';
});
</script>

</body>
</html>
