<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Account Settings | Smash Fitness Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <div class="brand"><div class="logo">SF</div><div><h1>Account</h1></div></div>
  <nav class="main-nav">
    <a href="index.html">Home</a>
    <a href="workouts.html">Workouts</a>
    <a href="nutrition.html">Nutrition</a>
    <a href="membership.html">Membership</a>
  </nav>
  <div id="auth-area" class="auth-area">
    <button id="auth-btn" class="auth-btn">Login</button>
  </div>
</header>

<main class="container">
  <div class="card form-card">
    <h2>Account settings</h2>
    <p class="muted">Update your demo account details (stored locally in your browser).</p>
    <form id="acctForm" style="margin-top:12px">
      <div class="form-row">
        <input id="acct-name" class="input" placeholder="Full name">
        <input id="acct-email" class="input" placeholder="Email (optional)">
      </div>
      <div class="form-row" style="margin-top:8px">
        <label class="small" style="margin-right:8px">Role</label>
        <select id="acct-role" class="input">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div style="margin-top:10px">
        <button id="saveAcct" class="btn" type="button">Save</button>
        <button id="clearAcct" class="btn secondary" type="button">Clear</button>
      </div>
    </form>
    <div id="modeArea" style="margin-top:16px"></div>
    <div id="acctMsg" class="muted small" style="margin-top:12px"></div>
  </div>
</main>

<footer class="site-footer">© 2025 Smash Fitness Studio</footer>

<script src="auth.js"></script>
<script>
(function(){
  const KEY = 'sf_user';
  const nameEl = document.getElementById('acct-name');
  const emailEl = document.getElementById('acct-email');
  const roleEl = document.getElementById('acct-role');
  const msg = document.getElementById('acctMsg');
  const modeArea = document.getElementById('modeArea');
  function load(){
    try{ const o = JSON.parse(localStorage.getItem(KEY)||'null'); if(o){ nameEl.value = o.name||''; emailEl.value = o.email||''; if(roleEl) roleEl.value = o.role||'member' } }
    catch(e){}
    renderMode();
  }
  function save(){
    const name = nameEl.value.trim(); const email = emailEl.value.trim();
    if(!name){ msg.textContent = 'Please enter a name.'; return }
    const role = (roleEl && roleEl.value) || 'member';
    localStorage.setItem(KEY, JSON.stringify({name, email, role})); msg.textContent = 'Saved.'; setTimeout(()=>msg.textContent='',2000); window.dispatchEvent(new Event('storage'));
    // re-render auth area by calling auth script render indirectly (it reacts on DOMContentLoaded only), so reload the page header area
    setTimeout(()=> location.reload(), 300);
  }
  function clearAll(){ localStorage.removeItem(KEY); msg.textContent = 'Cleared.'; setTimeout(()=>{ msg.textContent=''; location.reload() },800) }
  document.getElementById('saveAcct').addEventListener('click', save);
  document.getElementById('clearAcct').addEventListener('click', clearAll);
  load();
  
  function renderMode(){
    if(!modeArea) return;
    try{
      const o = JSON.parse(localStorage.getItem(KEY)||'null') || {};
      const role = o.role || 'member';
      if(role === 'admin'){
        modeArea.innerHTML = `<div class="card">
          <h3>Admin Panel</h3>
          <p class="muted">Tools for gym staff and managers.</p>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
            <a class="btn" href="admin.html#members">Manage Members</a>
            <a class="btn" href="admin.html#past">Past Members</a>
            <a class="btn" href="admin.html#due">Due Members</a>
            <a class="btn" href="admin.html#attendance">Attendance</a>
            <a class="btn" href="admin.html#staff">Staff Attendance</a>
            <a class="btn" href="admin.html#hours">Working Hours</a>
            <a class="btn" href="admin.html#calendar">Calendar</a>
            <a class="btn" href="admin.html#finance">Incomes & Expenses</a>
          </div>
          <p class="muted" style="margin-top:10px">Open the Admin Dashboard to manage members, attendance, and finances.</p>
        </div>`;
      } else {
        modeArea.innerHTML = `<div class="card">
          <h3>Member Dashboard</h3>
          <p class="muted">Your membership details and trainings.</p>
          <ul>
            <li>Membership: <strong>Active</strong></li>
            <li><a href="workouts.html">View recommended workouts</a></li>
            <li><a href="nutrition.html">Nutrition plans</a></li>
          </ul>
        </div>`;
      }
    } catch(e){ modeArea.innerHTML = ''; }
  }
})();
</script>

</body>
</html>
